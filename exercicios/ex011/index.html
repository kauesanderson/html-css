<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens Flexiveis</title>
</head>
<body>
    <h1>Imagem dinamica</h1>
    <p>Imagem abaixo flexivel</p>

    <picture>
        <source media="(max-width: 750px )" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="Imagem flexivel">
    </picture>
     <h1>Reproduzindo Audio</h1>
     <p>Vamos aprender a reproduzir audios em HMTL5</p>
     
     <audio controls preload="metadata">
        <source src="midia/messcall.mp3" type="audio/mpeg">
        <source src="midia/messcall.ogg" type="audio/ogg">
        Seu navegador não suporta áudio.
     </audio>
</body>
</html>
